status=warn

property.APP_NAME=${sys:spring.application.name:-app}
property.LOG_DIR=${sys:log.dir:-logs}
property.ROOT_LEVEL=${sys:log.level:-INFO}
property.LOG_PATTERN=%d{yyyy-MM-dd HH:mm:ss.SSS}{Asia/Seoul} -%5p ${sys:PID:- } --- [%15.15t] %-40.40logger{39} :    %X{transactionId}%m%n%xEx

# ============================================================
# Appenders
# ============================================================

appender.console.type=Console
appender.console.name=ConsoleAppender
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=${LOG_PATTERN}


# ============================================================
# Loggers
# ============================================================

# 노이즈 억제
logger.spring.type=AsyncLogger
logger.spring.name=org.springframework
logger.spring.level=WARN
logger.spring.additivity=false
logger.spring.appenderRef.console.ref=ConsoleAppender

logger.netty.type=AsyncLogger
logger.netty.name=io.netty
logger.netty.level=WARN
logger.netty.additivity=false
logger.netty.appenderRef.console.ref=ConsoleAppender

logger.reactor.type=AsyncLogger
logger.reactor.name=reactor.netty
logger.reactor.level=WARN
logger.reactor.additivity=false
logger.reactor.appenderRef.console.ref=ConsoleAppender

# Root
rootLogger.level=${ROOT_LEVEL}
rootLogger.type=asyncRoot
rootLogger.appenderRef.console.ref=ConsoleAppender